
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Love Pets</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { background: linear-gradient(135deg, #ce71bd 0%, #43c6ac 100%); }
        .container { background: rgba(255,255,255,0.95); max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 16px; }
        .toggle-buttons button.active { background: #4CAF50; }
        .message.success { color: green; }
        .message.error { color: red; }
        #logout-button { display: none; }
    </style>
</head>
<body>
    <header style="background: #b63ba7; color: white; text-align: center; padding: 1rem;">
        <h1 style="font-family: 'Pacifico', cursive; font-size: 2rem;">Love Pets</h1>
    </header>
    <main class="container">
        <div class="toggle-buttons" style="display: flex; justify-content: center; margin-bottom: 20px;">
            <button id="login-toggle" class="active" style="background: #b25c9d; color: white; border: none; padding: 10px 25px; cursor: pointer; margin: 0 5px; border-radius: 5px;">Login</button>
            <button id="register-toggle" style="background: #b25c9d; color: white; border: none; padding: 10px 25px; cursor: pointer; margin: 0 5px; border-radius: 5px;">Register</button>
        </div>
        <section id="login-section" style="display: block;">
            <h2>Login</h2>
            <form id="login-form">
                <div style="margin-bottom: 15px;"><label>Username/Email</label><input type="text" id="login-user" required style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <div style="margin-bottom: 15px;"><label>Password</label><input type="password" id="login-pass" required minlength="6" style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <button type="submit" style="background: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; width: 100%;">Login</button>
                <div id="login-msg" style="margin-top: 10px; font-weight: bold; display: none;"></div>
            </form>
        </section>
        <section id="register-section" style="display: none;">
            <h2>Register</h2>
            <form id="register-form">
                <div style="margin-bottom: 15px;"><label>Username</label><input type="text" id="reg-user" required style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <div style="margin-bottom: 15px;"><label>Email</label><input type="email" id="reg-email" required style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <div style="margin-bottom: 15px;"><label>Password</label><input type="password" id="reg-pass" required minlength="6" style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <div style="margin-bottom: 15px;"><label>Confirm</label><input type="password" id="reg-confirm" required style="width: 100%; padding: 10px; border-radius: 5px;" /></div>
                <button type="submit" style="background: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; width: 100%;">Register</button>
                <div id="reg-msg" style="margin-top: 10px; font-weight: bold; display: none;"></div>
            </form>
        </section>
    </main>
    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [{username: 'user', email: 'user@test.com', password: 'pass123'}];
        
        document.getElementById('login-toggle').onclick = () => {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('login-toggle').classList.add('active');
            document.getElementById('register-toggle').classList.remove('active');
        };
        
        document.getElementById('register-toggle').onclick = () => {
            document.getElementById('register-section').style.display = 'block';
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-toggle').classList.add('active');
            document.getElementById('login-toggle').classList.remove('active');
        };
        
        document.getElementById('login-form').onsubmit = e => {
            e.preventDefault();
            const msg = document.getElementById('login-msg');
            msg.style.display = 'none';
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const found = users.find(u => (u.username === user || u.email === user) && u.password === pass);
            if (found) {
                localStorage.setItem('currentUser', JSON.stringify(found));
                alert('Login success!');
                window.location.href = 'index.html';
            } else {
                msg.textContent = 'Wrong credentials';
                msg.className = 'error';
                msg.style.display = 'block';
            }
        };
        
        document.getElementById('register-form').onsubmit = e => {
            e.preventDefault();
            const msg = document.getElementById('reg-msg');
            msg.style.display = 'none';
            const username = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;
            if (pass !== confirm) return msg.textContent = 'Passwords mismatch', msg.className = 'error', msg.style.display = 'block';
            if (users.find(u => u.username === username || u.email === email)) return msg.textContent = 'User exists', msg.className = 'error', msg.style.display = 'block';
            const newUser = {username, email, password: pass};
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            msg.textContent = 'Registered! Login now.';
            msg.className = 'success';
            msg.style.display = 'block';
            document.getElementById('login-toggle').click();
        };
        
        // Check if logged in
        if (localStorage.getItem('currentUser')) {
            document.getElementById('logout-button').style.display = 'inline';
        }
    </script>
</body>
</html>
